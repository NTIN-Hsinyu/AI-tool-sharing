<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>護理技術考醫囑抽籤系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0f4f8;
        }

        .slot-container {
            height: 120px;
            overflow: hidden;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: white;
            position: relative;
        }

        .slot-track {
            display: flex;
            flex-direction: column;
        }

        .slot-item {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 15px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #2d3748;
        }

        .highlight-box {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 120px;
            transform: translateY(-50%);
            border: 4px solid #4299e1;
            border-radius: 12px;
            pointer-events: none;
            background-color: rgba(66, 153, 225, 0.05);
            z-index: 10;
        }

        .result-card {
            border-left: 8px solid #4299e1;
        }

        .blur-effect {
            filter: blur(2px);
        }

        .student-highlight {
            border-color: #ed8936;
            background-color: rgba(237, 137, 54, 0.05);
        }
        .student-border {
            border: 4px solid #ed8936;
        }

        .grader-highlight {
            border-color: #38a169;
            background-color: rgba(56, 161, 105, 0.05);
        }
        .grader-border {
            border: 4px solid #38a169;
        }

        .mono-font {
            font-family: 'Roboto Mono', 'Noto Sans TC', monospace;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-6">
            <h1 class="text-3xl font-bold text-blue-800 mb-2">技術考醫囑抽籤系統</h1>
            <p class="text-gray-600 font-medium">IVD 給藥技術隨機情境練習</p>
            
            <!-- 音效控制區 -->
            <div class="mt-4 flex items-center justify-center gap-4 text-sm text-gray-500">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="sound-toggle" checked class="w-4 h-4 text-blue-600 rounded">
                    <span>啟用音效</span>
                </label>
                <div class="flex items-center gap-2">
                    <span>音量</span>
                    <input type="range" id="volume-control" min="0" max="1" step="0.1" value="0.5" class="w-24 h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                </div>
            </div>

            <div class="mt-4 max-w-2xl mx-auto bg-blue-50 border border-blue-100 rounded-xl p-4 text-left">
                <div class="flex items-start gap-3">
                    <span class="text-xl mt-1">💡</span>
                    <div>
                        <h3 class="font-bold text-blue-900 mb-1">臨床情境：</h3>
                        <p id="scenario-text" class="text-blue-800 text-sm leading-relaxed italic">
                            正在生成情境中...
                        </p>
                    </div>
                </div>
            </div>
        </header>

        <div class="flex flex-col lg:flex-row gap-8 mb-12">
            <!-- 第一步：醫囑抽籤區 -->
            <section class="flex-1 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <div class="flex items-center justify-center gap-2 mb-6 text-blue-700">
                    <span class="text-xl">🩺</span>
                    <h2 class="text-xl font-bold">第一步：抽取醫囑題目</h2>
                </div>
                
                <div class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-2 xl:grid-cols-4 gap-3 mb-6">
                    <div class="flex flex-col">
                        <label class="mb-1 text-xs font-semibold text-gray-500 text-center">藥物</label>
                        <div class="slot-container">
                            <div class="slot-track" id="track-drug"></div>
                            <div class="highlight-box"></div>
                        </div>
                    </div>
                    <div class="flex flex-col">
                        <label class="mb-1 text-xs font-semibold text-gray-500 text-center">稀釋液</label>
                        <div class="slot-container">
                            <div class="slot-track" id="track-diluent"></div>
                            <div class="highlight-box"></div>
                        </div>
                    </div>
                    <div class="flex flex-col">
                        <label class="mb-1 text-xs font-semibold text-gray-500 text-center">滴注時間</label>
                        <div class="slot-container">
                            <div class="slot-track" id="track-run"></div>
                            <div class="highlight-box"></div>
                        </div>
                    </div>
                    <div class="flex flex-col">
                        <label class="mb-1 text-xs font-semibold text-gray-500 text-center">後續處理</label>
                        <div class="slot-container">
                            <div class="slot-track" id="track-after"></div>
                            <div class="highlight-box"></div>
                        </div>
                    </div>
                </div>

                <div class="text-center">
                    <button id="draw-order-btn" class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg shadow-md transition duration-300 transform hover:scale-105">
                        🎲 抽取醫囑
                    </button>
                </div>
            </section>

            <!-- 第二步：人員抽籤區 -->
            <section class="lg:w-2/5 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <div class="flex items-center justify-center gap-2 mb-6 text-gray-700">
                    <span class="text-xl">👥</span>
                    <h2 class="text-xl font-bold">第二步：抽取人員名單</h2>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="flex flex-col">
                        <label class="mb-1 text-xs font-semibold text-orange-600 text-center">考試學生</label>
                        <div class="slot-container student-highlight">
                            <div class="slot-track" id="track-student"></div>
                            <div class="highlight-box student-border"></div>
                        </div>
                    </div>
                    <div class="flex flex-col">
                        <label class="mb-1 text-xs font-semibold text-green-600 text-center">評分學生</label>
                        <div class="slot-container grader-highlight">
                            <div class="slot-track" id="track-grader"></div>
                            <div class="highlight-box grader-border"></div>
                        </div>
                    </div>
                </div>

                <div class="text-center">
                    <button id="draw-people-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-lg shadow-md transition duration-300 transform hover:scale-105">
                        🎲 抽取名單
                    </button>
                </div>
            </section>
        </div>

        <!-- 結果顯示區 -->
        <div id="result-area" class="hidden opacity-0 transition-opacity duration-500">
            <div class="bg-white rounded-xl shadow-lg p-6 result-card bg-white border border-gray-200">
                <div class="flex flex-col md:flex-row justify-between items-start mb-8 gap-4 border-b border-gray-100 pb-4">
                    <div class="flex items-center gap-3">
                        <span class="text-2xl">📋</span>
                        <h2 class="text-2xl font-bold text-gray-800">目前考題設定</h2>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        <div id="student-tag" class="hidden bg-orange-500 text-white px-4 py-2 rounded-full font-bold text-lg shadow-sm"></div>
                        <div id="grader-tag" class="hidden bg-green-600 text-white px-4 py-2 rounded-full font-bold text-lg shadow-sm"></div>
                    </div>
                </div>
                
                <div id="order-display" class="hidden mono-font px-4">
                    <div class="space-y-4">
                        <div id="final-order-line1" class="text-2xl md:text-4xl font-bold text-blue-900 leading-tight"></div>
                        <div id="final-order-line2" class="text-2xl md:text-4xl font-bold text-blue-900 leading-tight"></div>
                    </div>
                </div>

                <div id="placeholder-text" class="text-center py-4 text-gray-400 italic">
                    請執行上方抽籤按鈕以生成完整考題內容
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 音效系統 ---
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function getAudioCtx() {
            if (!audioCtx) audioCtx = new AudioCtx();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        }

        function playTickSound() {
            if (!document.getElementById('sound-toggle').checked) return;
            const ctx = getAudioCtx();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            const vol = document.getElementById('volume-control').value;

            osc.type = 'sine';
            osc.frequency.setValueAtTime(150, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.1);

            gain.gain.setValueAtTime(vol * 0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);

            osc.connect(gain);
            gain.connect(ctx.destination);

            osc.start();
            osc.stop(ctx.currentTime + 0.1);
        }

        function playWinSound() {
            if (!document.getElementById('sound-toggle').checked) return;
            const ctx = getAudioCtx();
            const vol = document.getElementById('volume-control').value;

            const playTone = (freq, startTime, duration) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, startTime);
                gain.gain.setValueAtTime(vol * 0.2, startTime);
                gain.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(startTime);
                osc.stop(startTime + duration);
            };

            const now = ctx.currentTime;
            playTone(523.25, now, 0.2);      // C5
            playTone(659.25, now + 0.1, 0.2); // E5
            playTone(783.99, now + 0.2, 0.4); // G5
            playTone(1046.50, now + 0.3, 0.6); // C6
        }

        // --- 抽籤邏輯 ---
        const scenarios = [
            "個案因泌尿道感染住院治療，醫師給予抗生素治療。目前病人意識清楚，生命徵象平穩，左手留置 22G IV 導管一處，點滴通暢。請依醫囑執行 IVD 給藥技術。",
            "個案因蜂窩性組織炎住院治療，醫師給予抗生素治療。目前患部有紅腫熱痛情形，已留置 IV 導管。請核對醫囑並正確執行給藥作業與後續觀察。",
            "個案因肺炎住院治療，醫師給予抗生素治療。目前病人偶有咳嗽、痰液黏稠，留置之點滴固定良好。請依據抽籤醫囑內容，執行 IVD 給藥技術。"
        ];

        const data = {
            drug: ["Cefazolin 500mg", "Cefazolin 1000mg", "Cefazolin 1g", "Gentamicin 40mg", "Gentamicin 20mg"],
            diluent: ["in N/S 60ml", "in N/S 80ml", "in N/S 100ml"],
            run: ["run 30min", "run 60min", "run 1hr"],
            after: ["續打", "不續打"],
            studentList: ["學生 1", "學生 2", "學生 3", "學生 4"]
        };

        const flowRates = ["30ml/hr", "60ml/hr", "120ml/hr"];
        const itemHeight = 120;
        const repeatCount = 30; 
        
        let isDrawingOrder = false;
        let isDrawingPeople = false;

        function refreshScenario() {
            const scenarioElement = document.getElementById('scenario-text');
            const randomScenario = scenarios[Math.floor(Math.random() * scenarios.length)];
            scenarioElement.innerText = randomScenario;
        }

        function setupSlot(id, items) {
            const track = document.getElementById(`track-${id}`);
            if(!track) return;
            const extendedItems = [];
            for (let i = 0; i < repeatCount; i++) {
                extendedItems.push(...items);
            }
            track.innerHTML = extendedItems.map(item => `<div class="slot-item">${item}</div>`).join('');
            track.style.transform = `translateY(-${Math.floor(Math.random() * items.length) * itemHeight}px)`;
        }

        // 初始化
        ['drug', 'diluent', 'run', 'after', 'student', 'grader'].forEach(id => {
            const list = (id === 'student' || id === 'grader') ? data.studentList : data[id];
            setupSlot(id, list);
        });
        refreshScenario();

        function rollSlot(id, items, forcedIndex = null) {
            const track = document.getElementById(`track-${id}`);
            const targetIdx = forcedIndex !== null ? forcedIndex : Math.floor(Math.random() * items.length);

            track.style.transition = 'none';
            const resetPos = Math.floor(Math.random() * items.length) * itemHeight;
            track.style.transform = `translateY(-${resetPos}px)`;
            track.classList.remove('blur-effect');

            track.offsetHeight; 

            const duration = 1.5 + Math.random() * 1;
            const rounds = 6 + Math.floor(Math.random() * 4); 
            const finalPos = (items.length * rounds + targetIdx) * itemHeight;
            
            track.style.transition = `transform ${duration}s cubic-bezier(0.1, 0, 0.1, 1)`;
            track.style.transform = `translateY(-${finalPos}px)`;
            track.classList.add('blur-effect');

            // 模擬轉動過程中的滴答聲
            const tickInterval = setInterval(() => {
                const computedStyle = window.getComputedStyle(track);
                const matrix = new WebKitCSSMatrix(computedStyle.transform);
                if (Math.abs(matrix.m42) >= finalPos - 5) {
                    clearInterval(tickInterval);
                } else {
                    playTickSound();
                }
            }, 100);

            return targetIdx;
        }

        function showResultCard() {
            const area = document.getElementById('result-area');
            area.classList.remove('hidden');
            setTimeout(() => area.classList.add('opacity-100'), 50);
            document.getElementById('placeholder-text').classList.add('hidden');
        }

        function isValidPair(idx1, idx2) {
            if (idx1 === idx2) return false;
            const forbidden = [0, 3]; 
            if (forbidden.includes(idx1) && forbidden.includes(idx2)) return false;
            return true;
        }

        document.getElementById('draw-order-btn').addEventListener('click', () => {
            if (isDrawingOrder) return;
            isDrawingOrder = true;
            const btn = document.getElementById('draw-order-btn');
            btn.disabled = true;
            btn.innerText = "⏳ 抽取中...";

            refreshScenario();

            rollSlot('drug', data.drug);
            rollSlot('diluent', data.diluent);
            rollSlot('run', data.run);
            rollSlot('after', data.after);

            setTimeout(() => {
                playWinSound();
                ['drug', 'diluent', 'run', 'after'].forEach(id => {
                    document.getElementById(`track-${id}`).classList.remove('blur-effect');
                });
                
                const drug = data.drug[parseInt(document.getElementById('track-drug').style.transform.match(/\d+/)[0] / itemHeight) % data.drug.length];
                const diluent = data.diluent[parseInt(document.getElementById('track-diluent').style.transform.match(/\d+/)[0] / itemHeight) % data.diluent.length];
                const run = data.run[parseInt(document.getElementById('track-run').style.transform.match(/\d+/)[0] / itemHeight) % data.run.length];
                const after = data.after[parseInt(document.getElementById('track-after').style.transform.match(/\d+/)[0] / itemHeight) % data.after.length];

                document.getElementById('final-order-line1').innerText = `${drug} ${diluent} ${run} IVD Q8H`;
                
                let line2 = "";
                if (after === "續打") {
                    const randomRate = flowRates[Math.floor(Math.random() * flowRates.length)];
                    line2 = `N/S 500ml run ${randomRate}`;
                } else {
                    line2 = "N/S 500ml for anti";
                }
                document.getElementById('final-order-line2').innerText = line2;

                document.getElementById('order-display').classList.remove('hidden');
                showResultCard();
                btn.disabled = false;
                btn.innerText = "🎲 再次抽取醫囑";
                isDrawingOrder = false;
            }, 2600);
        });

        document.getElementById('draw-people-btn').addEventListener('click', () => {
            if (isDrawingPeople) return;
            isDrawingPeople = true;
            const btn = document.getElementById('draw-people-btn');
            btn.disabled = true;
            btn.innerText = "⏳ 人員挑選中...";

            let studentIdx, graderIdx;
            do {
                studentIdx = Math.floor(Math.random() * data.studentList.length);
                graderIdx = Math.floor(Math.random() * data.studentList.length);
            } while (!isValidPair(studentIdx, graderIdx));

            rollSlot('student', data.studentList, studentIdx);
            rollSlot('grader', data.studentList, graderIdx);

            setTimeout(() => {
                playWinSound();
                document.getElementById('track-student').classList.remove('blur-effect');
                document.getElementById('track-grader').classList.remove('blur-effect');
                
                const sTag = document.getElementById('student-tag');
                const gTag = document.getElementById('grader-tag');
                
                sTag.innerText = "考試：" + data.studentList[studentIdx];
                gTag.innerText = "評分：" + data.studentList[graderIdx];
                
                sTag.classList.remove('hidden');
                gTag.classList.remove('hidden');
                
                showResultCard();
                btn.disabled = false;
                btn.innerText = "🎲 再次抽取名單";
                isDrawingPeople = false;
            }, 2600);
        });
    </script>
</body>
</html>
