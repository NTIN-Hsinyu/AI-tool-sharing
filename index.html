<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Six AI Teammates · Nursing Education Sharing</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700;900&family=Roboto+Mono:wght@400;500;700&display=swap');

:root{
  --bg:#FAF8F3;
  --paper:#FFFFFF;
  --ink:#1C2B2A;
  --ink-soft:#4B5A58;
  --primary:#0E4749;
  --primary-2:#0A3638;
  --primary-soft:#E6EFEE;
  --accent:#D97748;
  --accent-soft:#FBE9DE;
  --pulse:#2F8F82;
  --line:#DDD5C7;
  --danger:#B5482F;
  --danger-soft:#F7E3DD;
  --gold:#B08C3E;
  --gold-soft:#F3ECDA;
  --radius:18px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Noto Sans TC',sans-serif;
  background:var(--bg);
  color:var(--ink);
  overflow:hidden;
  height:100vh;
  width:100vw;
}
h1,h2,h3,.serif{font-family:'Noto Serif TC',serif;}
.mono{font-family:'Roboto Mono','Noto Sans TC',monospace;}

/* ---------- pulse line signature ---------- */
.pulse-rule{
  width:100%; height:22px; overflow:hidden; opacity:.55;
}
.pulse-rule svg{width:100%;height:100%;display:block;}
.pulse-line{
  stroke:var(--pulse); stroke-width:2; fill:none;
  stroke-dasharray:600; stroke-dashoffset:600;
  animation:draw 2.4s ease-out forwards;
}
@keyframes draw{to{stroke-dashoffset:0;}}

/* ---------- top progress + chrome ---------- */
#topbar{
  position:fixed; top:0; left:0; right:0; height:4px; z-index:50;
  background:var(--line);
}
#topbar-fill{
  height:100%; background:linear-gradient(90deg,var(--pulse),var(--primary));
  width:0%; transition:width .4s ease;
}
#menu-btn{
  position:fixed; top:22px; left:28px; z-index:60;
  width:46px;height:46px;border-radius:50%;
  background:var(--paper); border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer; box-shadow:0 2px 10px rgba(14,71,73,.08);
}
#menu-btn svg{width:18px;height:18px;stroke:var(--primary);}

#toc{
  position:fixed; top:0; left:-380px; width:360px; height:100%;
  background:var(--primary-2); color:#fff; z-index:70;
  transition:left .35s ease; padding:80px 28px 28px;
  overflow-y:auto;
}
#toc.open{left:0;}
#toc h3{color:#fff; font-size:1.4rem; margin:0 0 20px;}
#toc .toc-item{
  display:flex; gap:12px; align-items:baseline;
  padding:11px 6px; border-bottom:1px solid rgba(255,255,255,.12);
  cursor:pointer; font-size:.92rem;
}
#toc .toc-item:hover{color:var(--accent-soft);}
#toc .toc-num{font-family:'Roboto Mono';color:var(--pulse); font-size:.8rem; width:24px; flex:none;}
#toc-overlay{
  position:fixed; inset:0; background:rgba(10,20,20,.35); z-index:65;
  opacity:0; pointer-events:none; transition:opacity .3s;
}
#toc-overlay.show{opacity:1; pointer-events:auto;}

/* ---------- slides ---------- */
#deck{height:100vh; width:100vw; position:relative;}
.slide{
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  padding:64px 88px 40px;
  opacity:0; visibility:hidden;
  transform:translateY(14px);
  transition:opacity .45s ease, transform .45s ease;
  overflow-y:auto;
}
.slide.active{opacity:1; visibility:visible; transform:translateY(0);}

.eyebrow{
  font-family:'Roboto Mono'; letter-spacing:.12em; font-size:.82rem;
  color:var(--pulse); font-weight:700; margin-bottom:10px;
  text-transform:uppercase;
}
.slide h2.title{
  font-size:2.5rem; font-weight:900; color:var(--primary); margin:0 0 6px;
  line-height:1.25;
}
.slide .lede{color:var(--ink-soft); font-size:1.08rem; max-width:900px; line-height:1.75; margin-bottom:26px;}

.grid2{display:grid; grid-template-columns:1fr 1fr; gap:22px;}
.grid3{display:grid; grid-template-columns:repeat(3,1fr); gap:20px;}

.card{
  background:var(--paper); border:1px solid var(--line); border-radius:var(--radius);
  padding:26px 28px; box-shadow:0 2px 14px rgba(14,71,73,.05);
}
.card h4{margin:0 0 10px; font-size:1.15rem; color:var(--primary); font-family:'Noto Serif TC';}
.card p{margin:0; color:var(--ink-soft); line-height:1.7; font-size:.98rem;}

.tip-box{
  background:var(--accent-soft); border-left:6px solid var(--accent);
  border-radius:14px; padding:20px 26px; margin-top:18px;
}
.tip-box h4{margin:0 0 8px; color:var(--accent); font-size:1.02rem;}
.tip-box p{margin:0;color:#5a3a26; line-height:1.7; font-size:.96rem;}

.warn-box{
  background:var(--danger-soft); border-left:6px solid var(--danger);
  border-radius:14px; padding:20px 26px;
}
.warn-box h4{margin:0 0 8px; color:var(--danger); font-size:1.05rem;}
.warn-box p{margin:0;color:#5e2c1c; line-height:1.7; font-size:.95rem;}

.prompt-box{
  background:var(--primary-2); border-radius:16px; padding:22px 26px; margin-top:16px;
  position:relative; color:#EAF3F1;
}
.prompt-box .ptitle{
  font-family:'Roboto Mono'; font-size:.85rem; color:var(--pulse);
  margin-bottom:10px; letter-spacing:.03em;
}
.prompt-box p{margin:0; line-height:1.8; font-size:.96rem; color:#DDEDEA;}
.copy-btn{
  position:absolute; top:18px; right:20px;
  background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.25);
  color:#fff; font-size:.78rem; padding:6px 14px; border-radius:20px;
  cursor:pointer; font-family:'Noto Sans TC';
}
.copy-btn:hover{background:rgba(255,255,255,.2);}

.steps{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:14px;}
.steps li{display:flex; gap:16px; align-items:flex-start;}
.step-num{
  flex:none; width:32px; height:32px; border-radius:50%;
  background:var(--primary); color:#fff; display:flex; align-items:center; justify-content:center;
  font-family:'Roboto Mono'; font-weight:700; font-size:.9rem;
}
.steps .stext strong{display:block; color:var(--ink); font-size:1rem; margin-bottom:2px;}
.steps .stext span{color:var(--ink-soft); font-size:.92rem; line-height:1.6;}

.badge{
  display:inline-block; padding:4px 14px; border-radius:20px;
  font-size:.78rem; font-family:'Roboto Mono'; font-weight:700;
  background:var(--primary-soft); color:var(--primary); margin-bottom:14px;
}
.badge.gold{background:var(--gold-soft); color:var(--gold);}
.badge.accent{background:var(--accent-soft); color:var(--accent);}

footer.speaker{
  margin-top:auto; padding-top:18px; border-top:1px solid var(--line);
  display:flex; justify-content:space-between; align-items:center;
  color:var(--ink-soft); font-size:.85rem;
}

/* bottom nav */
#nav{
  position:fixed; bottom:26px; left:0; right:0; z-index:55;
  display:flex; align-items:center; justify-content:center; gap:18px;
  pointer-events:none;
}
#nav > *{pointer-events:auto;}
.nav-btn{
  width:44px;height:44px;border-radius:50%; background:var(--paper);
  border:1px solid var(--line); display:flex; align-items:center; justify-content:center;
  cursor:pointer; box-shadow:0 2px 10px rgba(14,71,73,.1);
}
.nav-btn svg{width:16px;height:16px; stroke:var(--primary);}
.nav-btn.disabled{opacity:.3; pointer-events:none;}
#page-counter{
  font-family:'Roboto Mono'; font-size:.85rem; color:var(--ink-soft);
  background:var(--paper); border:1px solid var(--line); border-radius:20px;
  padding:10px 20px;
}

/* cover slide specific */
.cover-title{font-size:3.6rem; line-height:1.2; color:var(--primary); font-weight:900; margin:16px 0 18px;}
.cover-sub{font-size:1.25rem; color:var(--ink-soft); margin-bottom:34px; max-width:760px; line-height:1.6;}
.cover-tags{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:40px;}
.cover-tags span{
  background:var(--primary-soft); color:var(--primary); padding:8px 18px;
  border-radius:20px; font-size:.9rem; font-family:'Roboto Mono';
}
.tool-badge{
  display:flex !important; align-items:center; gap:10px;
  background:var(--paper) !important; border:1px solid var(--line);
  padding:8px 20px 8px 8px !important; color:var(--ink) !important;
  font-family:'Noto Sans TC' !important; font-weight:600; font-size:.95rem !important;
}
.tool-icon{
  width:30px; height:30px; border-radius:50%; flex:none;
  display:flex; align-items:center; justify-content:center;
}
.tool-icon svg{width:16px; height:16px;}

/* tool map */
.toolmap-group{margin-bottom:26px;}
.toolmap-group-label{font-family:'Roboto Mono'; font-size:.85rem; color:var(--pulse); font-weight:700; margin-bottom:10px;}
.tool-row{display:grid; grid-template-columns:repeat(3,1fr); gap:16px;}
.tool-chip{
  background:var(--paper); border:1px solid var(--line); border-radius:14px;
  padding:18px 20px; display:flex; gap:14px; align-items:flex-start;
}
.tool-chip .emoji{font-size:1.5rem;}
.tool-chip strong{display:block; color:var(--primary); font-size:1rem; margin-bottom:4px;}
.tool-chip span{color:var(--ink-soft); font-size:.85rem; line-height:1.5;}

.video-wrap{
  border-radius:14px; overflow:hidden; border:1px solid var(--line);
  aspect-ratio:16/9; max-width:640px;
}
.video-wrap iframe, .video-wrap video{width:100%; height:100%; border:none; display:block; background:#000;}

/* iframe slide */
.iframe-wrap{
  flex:1; border-radius:16px; overflow:hidden; border:1px solid var(--line);
  box-shadow:0 4px 20px rgba(14,71,73,.08); min-height:0;
}
.iframe-wrap iframe{width:100%; height:100%; border:none;}

/* ethics grid */
.ethic-card{border-radius:16px; padding:22px 24px; border-left:6px solid;}
.ethic-card h4{margin:0 0 10px; font-size:1.05rem; font-family:'Noto Serif TC';}
.ethic-card p{margin:0; line-height:1.7; font-size:.92rem; color:var(--ink-soft);}

@media (max-width:1100px){
  .slide{padding:48px 32px 30px;}
  .grid2,.grid3,.tool-row{grid-template-columns:1fr;}
  .cover-title{font-size:2.4rem;}
}
</style>
</head>
<body>

<div id="topbar"><div id="topbar-fill"></div></div>
<div id="menu-btn" onclick="toggleTOC()">
  <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18" stroke-linecap="round"/></svg>
</div>
<div id="toc-overlay" onclick="toggleTOC()"></div>
<div id="toc"></div>

<div id="deck"></div>

<div id="nav">
  <div class="nav-btn" id="prev-btn" onclick="go(-1)">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5"><path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>
  <div id="page-counter">1 / 14</div>
  <div class="nav-btn" id="next-btn" onclick="go(1)">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5"><path d="M9 18l6-6-6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>
</div>

<script>
function pulseSVG(w){
  return `<div class="pulse-rule"><svg viewBox="0 0 ${w} 22" preserveAspectRatio="none">
    <path class="pulse-line" d="M0 11 H${w*0.32} L${w*0.36} 3 L${w*0.4} 19 L${w*0.44} 11 H${w*0.6} L${w*0.64} 5 L${w*0.68} 17 L${w*0.72} 11 H${w}"/>
  </svg></div>`;
}

const SPEAKER_NAME = "Hsin-Yu Chao (Sherry) - National Tainan Junior College of Nursing";
const EVENT_LABEL = "Nursing & Healthcare Educator AI Sharing";

const slides = [];

/* 1. Cover */
slides.push({
  title:"Cover",
  html:`
  <div style="flex:1; display:flex; flex-direction:column; justify-content:center;">
    <div class="eyebrow">${EVENT_LABEL}</div>
    <h1 class="cover-title">From Question to Practice<br>AI Tools for Nursing Research &amp; Teaching</h1>
    <p style="font-size:1.3rem; font-weight:700; color:var(--primary); margin:4px 0 18px;">${SPEAKER_NAME}</p>
    <div class="cover-tags">
      <span class="tool-badge">
        <span class="tool-icon" style="background:var(--gold);">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8"><circle cx="12" cy="12" r="8"/><path d="M12 4 L12 12 L17 15" stroke-linecap="round"/></svg>
        </span>
        Research Track
      </span>
      <span class="tool-badge">
        <span class="tool-icon" style="background:var(--accent);">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8"><path d="M4 5.5C4 4.7 4.7 4 5.5 4H12V20H5.5C4.7 20 4 19.3 4 18.5V5.5Z"/><path d="M12 4H18.5C19.3 4 20 4.7 20 5.5V18.5C20 19.3 19.3 20 18.5 20H12" /></svg>
        </span>
        Teaching Track
      </span>
    </div>
  </div>
  <footer class="speaker"><span>Speaker: ${SPEAKER_NAME}</span><span>※ Tools update quickly — live demo reflects the interface on the day</span></footer>
  `
});

/* 2. Opening */
slides.push({
  title:"Opening: From Question to Practice",
  html:`
  <div class="eyebrow">Opening</div>
  <h2 class="title">From Question to Practice</h2>
  <p class="lede">Time is the one resource none of us have enough of — but that's no reason to settle for less innovative research or less engaging teaching. Used well, AI is what lets you turn limited time into a rich, innovative outcome, in both your research and your classroom.</p>
  <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin:18px 0;">
    <div class="card" style="flex:1 1 200px; text-align:center; background:var(--primary-soft); border:none;">
      <h4 style="margin-bottom:4px;">⏱️ Limited Time</h4>
      <p style="font-size:.9rem;">The constraint we all actually work under</p>
    </div>
    <div style="font-size:1.8rem; color:var(--line); flex:0 0 auto;">→</div>
    <div class="card" style="flex:1 1 200px; text-align:center; background:var(--accent-soft); border:none;">
      <h4 style="margin-bottom:4px;">🤖 AI as a Teammate</h4>
      <p style="font-size:.9rem;">What today's workshop is actually about</p>
    </div>
    <div style="font-size:1.8rem; color:var(--line); flex:0 0 auto;">→</div>
    <div class="card" style="flex:1 1 200px; text-align:center; background:var(--gold-soft); border:none;">
      <h4 style="margin-bottom:4px;">✨ Rich, Innovative Outcome</h4>
      <p style="font-size:.9rem;">What we're actually after</p>
    </div>
  </div>
  ${pulseSVG(1400)}
  <p style="font-weight:700; margin:14px 0 6px; color:var(--gold);">Research Track — Where the Time Goes</p>
  <div class="grid3">
    <div class="card"><h4>🧭 Hard to Formulate a Question</h4><p>A clinical or pedagogical concern stays too vague to search until it's broken into PICO.</p></div>
    <div class="card"><h4>📚 Literature Review Takes Forever</h4><p>Screening, reading, and cross-checking papers one by one eats up weeks.</p></div>
    <div class="card"><h4>📊 Data Analysis Feels Out of Reach</h4><p>SPSS/R syntax is a barrier even when the statistical logic is clear.</p></div>
  </div>
  <p style="font-weight:700; margin:18px 0 6px; color:var(--accent);">Teaching Track — Where the Time Goes</p>
  <div class="grid3">
    <div class="card"><h4>📚 Too Much to Read</h4><p>Guidelines and textbook chapters pile up before class — reading them one by one takes too long.</p></div>
    <div class="card"><h4>🎨 Materials Take Too Long</h4><p>Infographics, slides, and interactive materials all take time to design and produce.</p></div>
    <div class="card"><h4>📝 Practice Questions Never End</h4><p>Scenario-based questions and pop quizzes need constant updates, and grading adds to the load.</p></div>
  </div>
  <footer class="speaker"><span>${SPEAKER_NAME}</span><span>Part 0 · Opening</span></footer>
  `
});

/* 2b. Agenda */
slides.push({
  title:"Agenda",
  html:`
  <div class="eyebrow">Today's Plan</div>
  <h2 class="title">Agenda: Research Track &amp; Teaching Track</h2>
  <p class="lede">The morning stays in the Research Track; the afternoon finishes the Research Track, then moves into the Teaching Track.</p>
  <div class="card" style="margin-top:6px; border-left:4px solid var(--gold);">
    <h4 style="color:var(--gold);">Research Track — Part 1</h4>
    <div class="grid3" style="margin-top:10px;">
      <div class="card"><h4>Ask</h4><p>PICO framework — turn a vague concern into a searchable question</p></div>
      <div class="card"><h4>Acquire</h4><p>Literature search: Perplexity, Elicit, Consensus</p></div>
      <div class="card"><h4>Organize</h4><p>NotebookLM — build a cited knowledge base</p></div>
    </div>
  </div>
  <div class="card" style="border-left:4px solid var(--gold);">
    <h4 style="color:var(--gold);">Research Track — Part 2</h4>
    <div class="grid2" style="margin-top:10px;">
      <div class="card"><h4>Analyze</h4><p>Claude — statistics and charts from your own spreadsheet</p></div>
      <div class="card"><h4>Polish</h4><p>Grammarly &amp; QuillBot — manuscript grammar and rewriting</p></div>
    </div>
  </div>
  <div class="card" style="border-left:4px solid var(--accent);">
    <h4 style="color:var(--accent);">Teaching Track</h4>
    <div class="grid3" style="margin-top:10px;">
      <div class="card"><h4>Quick Prep</h4><p>Ask Gemini, Nano Banana, Gemini Storybook</p></div>
      <div class="card"><h4>Interactive Materials</h4><p>Gemini Canvas — case-study demos</p></div>
      <div class="card"><h4>Wrap-Up</h4><p>Integrated workflow, ethics &amp; guidelines, Q&amp;A</p></div>
    </div>
  </div>
  <footer class="speaker"><span>${SPEAKER_NAME}</span><span>Part 0 · Agenda</span></footer>
  `
});

/* 3. Tool map */
slides.push({
  title:"Tool Map Overview",
  html:`
  <div class="eyebrow">Overview</div>
  <h2 class="title">Today's Toolkit: Research Track &amp; Teaching Track</h2>
  <p class="lede">You don't need to master everything today — knowing which one to reach for makes everything else click.</p>

  <div class="toolmap-group">
    <div class="toolmap-group-label">Research Track — Ask</div>
    <div class="tool-row">
      <div class="tool-chip"><span class="emoji">🧭</span><div><strong>PICO Framework</strong><span>Not a tool — a way of turning a vague concern into a searchable question</span></div></div>
      <div class="tool-chip" style="visibility:hidden"></div><div class="tool-chip" style="visibility:hidden"></div>
    </div>
  </div>
  <div class="toolmap-group">
    <div class="toolmap-group-label">Research Track — Acquire: Literature Search</div>
    <div class="tool-row">
      <div class="tool-chip"><span class="emoji">🔍</span><div><strong><a href="https://www.perplexity.ai" target="_blank" rel="noopener" style="color:inherit; text-decoration:underline dotted;">Perplexity</a></strong><span>Broad, fact-checked search with an Academic mode</span></div></div>
      <div class="tool-chip"><span class="emoji">📄</span><div><strong><a href="https://elicit.com" target="_blank" rel="noopener" style="color:inherit; text-decoration:underline dotted;">Elicit</a></strong><span>Academic-database search, extracts study data into tables</span></div></div>
      <div class="tool-chip"><span class="emoji">✅</span><div><strong><a href="https://consensus.app" target="_blank" rel="noopener" style="color:inherit; text-decoration:underline dotted;">Consensus</a></strong><span>Yes/No/Possibly evidence snapshot for a quick gut-check</span></div></div>
    </div>
  </div>
  <div class="toolmap-group">
    <div class="toolmap-group-label">Research Track — Organize</div>
    <div class="tool-row">
      <div class="tool-chip"><span class="emoji">📚</span><div><strong><a href="https://notebooklm.google.com" target="_blank" rel="noopener" style="color:inherit; text-decoration:underline dotted;">NotebookLM</a></strong><span>Turns everything you found into a cited Q&A knowledge base</span></div></div>
      <div class="tool-chip" style="visibility:hidden"></div><div class="tool-chip" style="visibility:hidden"></div>
    </div>
  </div>
  <div class="toolmap-group">
    <div class="toolmap-group-label">Research Track — Analyze &amp; Polish</div>
    <div class="tool-row">
      <div class="tool-chip"><span class="emoji">📊</span><div><strong><a href="https://claude.ai" target="_blank" rel="noopener" style="color:inherit; text-decoration:underline dotted;">Claude</a></strong><span>Runs real statistics and renders charts from an uploaded spreadsheet</span></div></div>
      <div class="tool-chip"><span class="emoji">✍️</span><div><strong><a href="https://www.grammarly.com" target="_blank" rel="noopener" style="color:inherit; text-decoration:underline dotted;">Grammarly</a> &amp; <a href="https://quillbot.com" target="_blank" rel="noopener" style="color:inherit; text-decoration:underline dotted;">QuillBot</a></strong><span>Manuscript grammar check and rewrite/paraphrase</span></div></div>
      <div class="tool-chip" style="visibility:hidden"></div>
    </div>
  </div>

  <div class="toolmap-group">
    <div class="toolmap-group-label">Teaching Track — Quick Prep</div>
    <div class="tool-row">
      <div class="tool-chip"><span class="emoji">💬</span><div><strong><a href="https://gemini.google.com/overview/gemini-in-chrome/" target="_blank" rel="noopener" style="color:inherit; text-decoration:underline dotted;">Ask Gemini</a></strong><span>Browser side panel — ask questions about any webpage, video, or PDF on the spot</span></div></div>
      <div class="tool-chip"><span class="emoji">🎨</span><div><strong><a href="https://gemini.google.com" target="_blank" rel="noopener" style="color:inherit; text-decoration:underline dotted;">Nano Banana</a></strong><span>Gemini's image generator — infographics and posters with accurate embedded text</span></div></div>
      <div class="tool-chip"><span class="emoji">📖</span><div><strong><a href="https://gemini.google.com" target="_blank" rel="noopener" style="color:inherit; text-decoration:underline dotted;">Gemini Storybook</a></strong><span>Turns a prompt into a 10-page illustrated story with narration</span></div></div>
    </div>
  </div>
  <div class="toolmap-group">

/* ---------------- engine ---------------- */
let current = 0;
const deck = document.getElementById('deck');
const toc = document.getElementById('toc');

slides.forEach((s,i)=>{
  const sec = document.createElement('section');
  sec.className = 'slide' + (s.isDemo ? ' demo-slide' : '');
  sec.id = 'slide-'+i;
  sec.innerHTML = s.html;
  deck.appendChild(sec);
});

let tocHtml = '<h3>Contents</h3>';
slides.forEach((s,i)=>{
  tocHtml += `<div class="toc-item" onclick="jump(${i})"><span class="toc-num">${String(i+1).padStart(2,'0')}</span><span>${s.title}</span></div>`;
});
toc.innerHTML = tocHtml;

function render(){
  document.querySelectorAll('.slide').forEach((el,i)=>{
    el.classList.toggle('active', i===current);
  });
  document.getElementById('page-counter').textContent = (current+1)+' / '+slides.length;
  document.getElementById('topbar-fill').style.width = ((current+1)/slides.length*100)+'%';
  document.getElementById('prev-btn').classList.toggle('disabled', current===0);
  document.getElementById('next-btn').classList.toggle('disabled', current===slides.length-1);
}
function go(d){
  const next = current+d;
  if(next<0 || next>=slides.length) return;
  current = next;
  render();
}
function jump(i){
  current = i;
  render();
  toggleTOC();
}
function toggleTOC(){
  document.getElementById('toc').classList.toggle('open');
  document.getElementById('toc-overlay').classList.toggle('show');
}
function copyPrompt(btn){
  const p = btn.parentElement.querySelector('p');
  navigator.clipboard.writeText(p.textContent).then(()=>{
    const old = btn.textContent;
    btn.textContent = 'Copied';
    setTimeout(()=>btn.textContent = old, 1500);
  });
}
function ebpStep(el, name, num, desc, color){
  document.querySelectorAll('.ebp-step circle').forEach(c=>{
    c.setAttribute('stroke-width','3');
    c.style.filter = '';
  });
  el.querySelector('circle').style.filter = 'drop-shadow(0 0 6px rgba(0,0,0,.25))';
  el.querySelector('circle').setAttribute('stroke-width','5');
  const detail = document.getElementById('ebp-detail');
  if(detail){
    detail.style.borderLeftColor = color;
    detail.innerHTML = '<h4 style="color:'+color+';">'+num+' '+name+'</h4><p>'+desc+'</p>';
  }
}
render();
</script>
